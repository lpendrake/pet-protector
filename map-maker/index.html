<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet Protector Map Maker</title>
    <style>
      body { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: sans-serif; color: white; }
      #app { display: flex; width: 100vw; height: 100vh; }
      #sidebar { width: 300px; background: #222; border-right: 1px solid #444; display: flex; flex-direction: column; }
      #viewport-container { flex: 1; position: relative; }
      #status-bar { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.5); padding: 5px 10px; font-size: 12px; }
      .palette-section { padding: 10px; border-bottom: 1px solid #444; }
      .palette-title { font-weight: bold; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; color: #888; }
      .tile-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
      .tile-item { aspect-ratio: 1; border: 2px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #333; }
      .tile-item:hover { background: #444; }
      .tile-item.active { border-color: #3d8c40; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="sidebar">
        <div class="palette-section">
          <button id="save-master-btn" style="width: 100%; padding: 10px; background: #3d8c40; color: white; border: none; cursor: pointer; font-weight: bold;">SAVE MASTER (PROMOTES TMP)</button>
        </div>
        <div class="palette-section" id="ground-palette">
          <div class="palette-title">Ground Tiles</div>
          <div id="selected-tile-name" style="font-size: 12px; margin-bottom: 5px; color: #aaa;">Selected: Grassland</div>
          <div class="tile-grid" id="ground-grid"></div>
        </div>
        <div class="palette-section" id="item-palette">
          <div class="palette-title">Items</div>
          <div class="tile-grid" id="item-grid"></div>
        </div>
        <div class="palette-section" id="entity-palette">
          <div class="palette-title">Entities (Search & Snap)</div>
          <div id="entity-list" style="max-height: 200px; overflow-y: auto;"></div>
        </div>
        <div class="palette-section" id="maps-manager">
          <div class="palette-title">Deployed Maps Manager</div>
          <div id="maps-list" style="font-size: 11px;"></div>
        </div>
      </div>
      <div id="viewport-container">
        <div id="status-bar">
          Time since last auto-save: <span id="auto-save-timer">Never</span> | 
          Version: <span id="map-version">0</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
